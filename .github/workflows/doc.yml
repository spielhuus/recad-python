name: Deploy Documentation

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main", "master"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build Sphinx Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libcairo2-dev libpango1.0-dev libngspice0-dev \
            libpoppler-glib-dev libssl-dev libclang-dev \
            kicad-symbols

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Create Virtual Environment & Fix PKG_CONFIG_PATH
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:${PKG_CONFIG_PATH:-}" >> $GITHUB_ENV

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Python build tools and Sphinx dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin sphinx furo sphinx-exec-code matplotlib jupyter

      - name: Build and install recad
        # We must install the package so Sphinx can import it to run autodoc and exec_code
        run: maturin develop --release --features svg

      - name: Ensure static directory exists
        # Required because schema.plot(path='docs/_static/schema_opamp.svg') will fail if the folder doesn't exist
        run: mkdir -p docs/_static

      - name: Build Sphinx HTML documentation
        run: |
          sphinx-build -b html docs docs/_build/html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/_build/html'

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
